<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found — AutoPrime luxury pre-owned vehicles." />
  <title>Page Not Found — AutoPrime</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #111111;
      --gold: #c9a96e;
      --gold-light: #e2c992;
      --gold-dark: #a8883d;
      --text: #f0ece2;
      --text-dim: #8a8475;
      --text-muted: #5a5549;
      --border: rgba(201,169,110,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    body.loaded { opacity: 1; }

    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: 8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    p {
      color: var(--text-dim);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 40px;
    }

    .btn-gold {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--bg);
      padding: 16px 40px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(201,169,110,0.3);
    }

    @media (max-width: 600px) {
      .error-code { font-size: 5rem; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <a href="index.html" class="btn-gold">Back to Home</a>
  <script>
    // PAGE TRANSITIONS
    document.body.classList.add('loaded');
    document.querySelectorAll('a[href]').forEach(a => {
      a.addEventListener('click', function(e) {
        const href = this.getAttribute('href');
        if (href.startsWith('#') || href.startsWith('tel:') || href.startsWith('mailto:') || this.target === '_blank') return;
        e.preventDefault();
        document.body.classList.remove('loaded');
        setTimeout(() => { window.location.href = href; }, 300);
      });
    });
  </script>
</body>
</html>
